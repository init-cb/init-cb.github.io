#   deadline: "2026-05-01 23:59:59"
#   timezone: "AoE"
#   date: "Nov 29-Dec 3, 2026"
#   place: "Chicago, Illinois, United States"
#   ccf:
#   core:
#   thcpl:
#
# If a deadline is unknown, use:
